services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3590:3590"
    volumes:
      - fleet-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3590/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas_fleet_console
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_fleet_console"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2024-01-13T08-44-48Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/atlas-attachments --ignore-existing;
      mc anonymous set none local/atlas-attachments;
      echo 'MinIO bucket configured';
      "

  messaging:
    build:
      context: .
      dockerfile: Dockerfile.messaging
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      NODE_ENV: production
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas_fleet_console
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: atlas-attachments
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      JWT_SECRET: atlas-fleet-jwt-secret-t070
      CLAMAV_HOST: localhost
      CLAMAV_PORT: "3310"
      RATE_LIMIT_MESSAGES_PER_MIN: "60"
      RATE_LIMIT_UPLOADS_PER_MIN: "10"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  messaging-migrate:
    build:
      context: .
      dockerfile: Dockerfile.messaging
    command: ["node", "src/db/migrate.js"]
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas_fleet_console
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
      messaging:
        condition: service_healthy

volumes:
  fleet-data:
  pgdata:
  redis-data:
  minio-data:
