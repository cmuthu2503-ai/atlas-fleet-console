services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3590:3590"
    volumes:
      - fleet-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3590/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  fleet-data:
